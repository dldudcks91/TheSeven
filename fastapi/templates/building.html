<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건물 관리</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            padding: 10px;
            background-color: white;
            margin: 0;
        }
        .game-section h3 {
            margin: 0 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #ddd;
            font-size: 16px;
        }
        .container {
            max-width: 100%;
            margin: 0;
        }
        strong {
        margin-right: 10px;
        }
        .building-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #ddd;
            font-size: 12px;
        }
        
        .building-table th,
        .building-table td {
            padding: 4px 6px;
            text-align: left;
            border: 1px solid #ddd;
            line-height: 1.2;
        }
        
        .building-table th {
            background-color: #f5f5f5;
            font-weight: bold;
            font-size: 12px;
        }
        
        .action-buttons button {
            margin-right: 3px;
            padding: 2px 5px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            font-size: 9px;
            border-radius: 2px;
        }
        
        .timer {
            font-family: monospace;
            font-size: 12px;
        }
        
        .timer-display {
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid #ddd;
            background: #f0f8ff;
            border-radius: 4px;
            font-size: 12px;
            
        }
        
        .timer-item {
            display: inline-block;
            margin-right: 15px;
            margin-bottom: 5px;
            padding: 3px 6px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-family: monospace;
            font-size: 11px;
        }
        
        .timer-item.completed {
            background: #e8f5e8;
            border-color: #4caf50;
            color: #2e7d32;
        }
        
        .timer-item.running {
            background: #fff3e0;
            border-color: #ff9800;
            color: #f57c00;
        }
        
        .result-box {
            margin-top: 10px;
            padding: 8px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
            display: none;
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="game-section"><h3>Construct</h3></div>
    
    <div class="container">
        <div id="timerDisplay" class="timer-display" style="display: none; ">
            <strong>진행 중인 작업: </strong>
            <div id="timerItems"></div>
            <button onclick="finishAllBuildings()" style="margin-top:4px; padding:2px 8px; font-size:10px; border:1px solid #4caf50; background:#e8f5e8; color:#2e7d32; cursor:pointer; border-radius:2px;">전체 즉시완료</button>
        </div>
        
        <table class="building-table">
            <thead>
                <tr>
                    <th>건물명</th>
                    <th>레벨</th>
                    <th>상태</th>
                    <th>비용</th>
                    <th>시간</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="buildingTableBody">
                </tbody>
        </table>
        
        <div id="result" class="result-box"></div>
    </div>

    <script>
        // ⭐ 다국어 설정을 위한 상수: 'korean_name' 또는 'english_name' 등으로 변경 가능
        const CURRENT_LANGUAGE_FIELD = 'korean_name'; // 👈 [변경/추가] 언어 설정 상수

        // 하드코딩된 건물 목록 대신 이름 매핑을 사용합니다.
        const buildingNameMap = {
            201: { english_name: 'town_hall', korean_name: '시청' },
            301: { english_name: 'academy', korean_name: '아카데미' },
            401: { english_name: 'barracks', korean_name: '병영' },
            501: { english_name: 'farm', korean_name: '농장' },
            502: { english_name: 'LumberMill', korean_name: '제재소' }, // korean_name 수정
            503: { english_name: 'Quarry', korean_name: '채석장' }, // korean_name 수정
        };
        
        let allBuildingsList = []; // config 데이터를 기반으로 생성될 최종 건물 목록
        let userBuildingData = {};
        let displayTimer = null;
        let userId = null;
        let buildingCostData = {};
        
        let completedBuildingChecks = new Set();
        
        window.onload = function() {
            window.parent.postMessage({
                type: 'request_config',
                configType: 'building'
            }, '*');
        };
        
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'set_player_id') {
                const newUserId = event.data.userId;
                
                if (userId !== newUserId) {
                    userId = newUserId;
                    
                    // config가 로드되었는지 확인하고 로드
                    if (Object.keys(buildingCostData).length > 0) {
                        loadBuildings();
                    }
                }
            }
            if (event.data && event.data.type === 'response_config') {
                const buildingConfig = event.data.payload;
                buildingCostData = buildingConfig;
                console.log('Building data received:', buildingCostData);
                
                // config 데이터 키를 기반으로 건물 목록 동적 생성
                allBuildingsList = Object.keys(buildingCostData).map(idxStr => {
                    const idx = parseInt(idxStr);
                    const names = buildingNameMap[idx] || { english_name: `unknown_${idx}`, korean_name: `[${idx}] 이름 없음` };
                    return {
                        idx: idx,
                        english_name: names.english_name,
                        korean_name: names.korean_name,
                        // ⭐ [변경] 상수 적용: 현재 선택된 언어 필드를 display_name으로 저장
                        display_name: names[CURRENT_LANGUAGE_FIELD] || names.korean_name
                    };
                }).sort((a, b) => a.idx - b.idx);
                
                // config가 로드된 후 userId가 있으면 건물 정보 로드 시작
                if (userId) {
                    loadBuildings();
                }
            }
        });

        function parseServerUTCTime(serverTimeString) {
            let utcString = serverTimeString;
            
            if (utcString.includes(' ') && !utcString.includes('T')) {
                utcString = utcString.replace(' ', 'T');
            }
            
            if (!utcString.endsWith('Z') && utcString.includes('T')) {
                utcString += 'Z';
            }
            
            return new Date(utcString);
        }

        function calculateUTCTimeDiff(serverUTCTime) {
            const endTime = parseServerUTCTime(serverUTCTime);
            const now = new Date();
            
            const diffMs = endTime - now;
            const diffSeconds = Math.max(0, Math.ceil(diffMs / 1000));
            
            return {
                totalMs: diffMs,
                totalSeconds: diffSeconds,
                minutes: Math.floor(diffSeconds / 60),
                seconds: diffSeconds % 60,
                isCompleted: diffMs <= 0,
                
                format: () => {
                    if (diffMs <= 0) return "완료";
                    const mins = Math.floor(diffSeconds / 60);
                    const secs = diffSeconds % 60;
                    return `${mins}:${secs.toString().padStart(2, '0')}`;
                }
            };
        }
        
        // 비용 포맷팅 헬퍼 함수 추가 (유닛과 동일한 이모지 사용)
        function formatCosts(costs) {
            if (!costs) return 'N/A';
            
            const parts = [];
            if (costs.food > 0) parts.push(`🌾${costs.food}`);
            if (costs.wood > 0) parts.push(`🪵${costs.wood}`);
            if (costs.stone > 0) parts.push(`🗿${costs.stone}`);
            if (costs.gold > 0) parts.push(`💰${costs.gold}`);
            
            return parts.join(' / ');
        }


        function generateBuildingTable() {
            const tbody = document.getElementById('buildingTableBody');
            if (!tbody) {
                console.error("buildingTableBody 요소를 찾을 수 없습니다.");
                return;
            }
            tbody.innerHTML = '';
            
            // allBuildingsList를 사용하여 동적으로 테이블 생성
            allBuildingsList.forEach(building => {
                const data = userBuildingData[building.idx] || { building_lv: 0, status: 0 };
                
                // 다음 레벨의 비용과 시간 정보 가져오기
                const nextLevelConfig = buildingCostData?.[building.idx]?.[data.building_lv + 1];
                
                let costDisplay = '최고 레벨';
                let timeDisplay = '';
                let actionButton = '최고 레벨';
                let hasNextLevel = !!nextLevelConfig;

                if (hasNextLevel) {
                    costDisplay = formatCosts(nextLevelConfig.cost);
                    timeDisplay = `${nextLevelConfig.time}초`;

                    if (data.status === 1 || data.status === 2) {
                        // 건설/업그레이드 진행중 → 취소, 가속 버튼
                        actionButton = `<button onclick="cancelBuilding(${building.idx})">취소</button>` +
                            `<button onclick="speedupBuilding(${building.idx})">가속</button>`;
                    } else {
                        actionButton = data.building_lv === 0 ?
                            `<button onclick="callAPI(2002, ${building.idx})">건설</button>` :
                            `<button onclick="callAPI(2003, ${building.idx})">업그레이드</button>`;
                    }
                }


                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="font-size: 9px;">${building.display_name || building.korean_name}</td>
                    <td>Lv.${data.building_lv}</td>
                    <td>${getStatusText(data.status)}</td>
                    <td>${costDisplay}</td>
                    <td>${timeDisplay}</td>
                    <td>
                        <div class="action-buttons">
                            ${actionButton}
                        </div>
                    </td>
                `;
                
                tbody.appendChild(row);
            });
            
            startDisplayTimer();
        }
        
        function getStatusText(status) {
            switch(status) {
                case 0: return '정상';
                case 1: return '건설중';
                case 2: return '업그레이드중';
                default: return '알 수 없음';
            }
        }
        
        function startDisplayTimer() {
            if (displayTimer) clearInterval(displayTimer);
            
            displayTimer = setInterval(() => {
                updateDisplayOnly();
            }, 1000);
        }
        
        async function completeBuilding(buildingIdx) {
            const building = allBuildingsList.find(b => b.idx === buildingIdx);
            // ⭐ [변경] display_name 사용
            const buildingName = building ? (building.display_name || building.korean_name) : buildingIdx; 
            
            const checkKey = `${buildingIdx}_${Date.now()}`;
            if (completedBuildingChecks.has(buildingIdx)) {
                console.log(`⏭️ ${buildingName} 이미 완료 처리 중...`);
                return;
            }
            
            completedBuildingChecks.add(buildingIdx);
            
            try {
                console.log(`✅ ${buildingName} 건설/업그레이드 완료! API 2004 호출 시작`);
                showResult(`${buildingName} 완료 처리 중...`);
                
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_no: parseInt(userId),
                        api_code: 2004,
                        data: {
                            building_idx: buildingIdx
                        }
                    })
                });
                
                const result = await response.json();
                console.log(`🎉 ${buildingName} 완료 API 결과:`, result);
                
                

                if (result.success) {

                    building_data = result.data['building']
                    mission_data = result.data['mission_update']
                    if (building_data) {
                        userBuildingData[buildingIdx] = building_data;
                    }
                    
                    await loadBuildings();
                    showResult(`${buildingName} 완료! 레벨업 성공`);
                    
                    setTimeout(() => {
                        completedBuildingChecks.delete(buildingIdx);
                    }, 2000);

                    if (mission_data) {
                            window.parent.postMessage({
                                type: 'update_mission',
                                payload: mission_data
                            }, '*');
                        }

                } else {
                    showResult(`${buildingName} 완료 처리 실패: ${result.message || '알 수 없는 오류'}`);
                    completedBuildingChecks.delete(buildingIdx);
                }
            } catch (error) {
                console.error(`❌ ${buildingName} 완료 API 에러:`, error);
                showResult(`${buildingName} 완료 처리 에러: ${error.message}`);
                completedBuildingChecks.delete(buildingIdx);
            }
        }
        
        function updateDisplayOnly() {
            const timerDisplay = document.getElementById('timerDisplay');
            const timerItems = document.getElementById('timerItems');
            
            if (!timerDisplay || !timerItems) return;
            
            let hasActiveBuildings = false;
            timerItems.innerHTML = '';
            
            allBuildingsList.forEach(building => {
                const data = userBuildingData[building.idx];
                
                // ⭐ [변경] display_name 사용
                console.log(`${building.display_name || building.korean_name} 타이머 체크:`, {
                    data: data,
                    status: data?.status,
                    end_time: data?.end_time,
                    hasData: !!data,
                    isActive: data && data.status !== 0 && data.end_time
                });
                
                if (!data || data.status === 0 || !data.end_time) {
                    return;
                }
                
                hasActiveBuildings = true;
                
                const timeDiff = calculateUTCTimeDiff(data.end_time);
                
                const timerItem = document.createElement('span');
                timerItem.className = 'timer-item';
                
                // ⭐ [변경] display_name 사용
                if (!timeDiff.isCompleted) {
                    timerItem.textContent = `${building.display_name || building.korean_name}: ${timeDiff.format()}`;
                    timerItem.classList.add('running');
                } else {
                    timerItem.textContent = `${building.display_name || building.korean_name}: 완료됨`;
                    timerItem.classList.add('completed');
                    
                    completeBuilding(building.idx);
                }
                
                timerItems.appendChild(timerItem);
            });
            
            console.log(`타이머 업데이트: 활성 건물 ${hasActiveBuildings ? '있음' : '없음'}`);
            
            timerDisplay.style.display = hasActiveBuildings ? 'flex' : 'none';
            
            if (!hasActiveBuildings && displayTimer) {
                clearInterval(displayTimer);
                displayTimer = null;
                console.log('📺 진행중인 건물 없음 - 화면 업데이트 타이머 중단');
            }
        }
        
        async function loadBuildings() {
            if (!userId) {
                showResult('플레이어 ID가 설정되지 않았습니다. 부모 페이지에서 ID를 설정하세요.');
                return;
            }
            
            if (allBuildingsList.length === 0) {
                showResult('건물 설정 데이터가 로드되지 않았습니다.');
                return;
            }
            
            const previousData = { ...userBuildingData };
            userBuildingData = {};
            completedBuildingChecks.clear();
            
            if (displayTimer) {
                clearInterval(displayTimer);
                displayTimer = null;
            }
            showResult('건물 정보 로딩 중...');
            
            try {
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_no: parseInt(userId),
                        api_code: 2001,
                        data: {}
                    })
                });
                
                const result = await response.json();
                console.log('🏗️ 건물 데이터 로드:', result.data);
                
                if (result.success && result.data) {
                    for (const building of allBuildingsList) {
                        if (result.data[building.idx]) {
                            userBuildingData[building.idx] = result.data[building.idx];
                        } else {
                            userBuildingData[building.idx] = { building_lv: 0, status: 0 };
                        }
                    }
                } else {
                    for (const building of allBuildingsList) {
                        userBuildingData[building.idx] = previousData[building.idx] || { building_lv: 0, status: 0 };
                    }
                }
            } catch (error) {
                console.log(`정보 로드 에러:`, error);
                for (const building of allBuildingsList) {
                    userBuildingData[building.idx] = previousData[building.idx] || { building_lv: 0, status: 0 };
                }
            }
            
            generateBuildingTable();
            showResult('건물 정보 로드 완료');
        }
        
        async function callAPI(apiCode, buildingIdx) {
            if (!userId) {
                showResult('플레이어 ID를 입력하세요');
                return;
            }
            
            const building = allBuildingsList.find(b => b.idx === buildingIdx);
            // ⭐ [변경] display_name 사용
            const buildingName = building ? (building.display_name || building.korean_name) : buildingIdx;
            
            try {
                showResult(`${buildingName} 요청 중...`);
                
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_no: parseInt(userId),
                        api_code: apiCode,
                        data: {
                            building_idx: buildingIdx
                        }
                    })
                });
                
                const result = await response.json();
                console.log(`🔧 ${buildingName} API 호출 결과:`, result);
                
                if (result.success) {
                    if (result.data) {
                        userBuildingData[buildingIdx] = result.data;
                        console.log(`${buildingName} 업데이트된 데이터:`, result.data);
                    }
                    
                    await loadBuildings();
                    
                    if ((apiCode === 2002 || apiCode === 2003) && result.data && result.data.status !== 0) {
                        startDisplayTimer();
                    }
                    
                    showResult(`${buildingName} 성공: ${result.message || '완료'}`);
                } else {
                    showResult(`${buildingName} 실패: ${result.message || '알 수 없는 오류'}`);
                }
            } catch (error) {
                console.error(`❌ ${buildingName} API 에러:`, error);
                showResult(`${buildingName} 에러: ${error.message}`);
            }
        }
        
        async function cancelBuilding(buildingIdx) {
            if (!userId) { showResult('플레이어 ID를 입력하세요'); return; }
            const building = allBuildingsList.find(b => b.idx === buildingIdx);
            const name = building ? (building.display_name || building.korean_name) : buildingIdx;
            if (!confirm(`${name} 건설/업그레이드를 취소하시겠습니까?`)) return;
            try {
                showResult(`${name} 취소 중...`);
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_no: parseInt(userId), api_code: 2005, data: { building_idx: buildingIdx } })
                });
                const result = await response.json();
                if (result.success) {
                    await loadBuildings();
                    const refund = result.data?.refund_resources;
                    const refundText = refund ? ` (환불: ${formatCosts(refund)})` : '';
                    showResult(`${name} 취소 완료${refundText}`);
                } else {
                    showResult(`${name} 취소 실패: ${result.message}`);
                }
            } catch (error) {
                showResult(`${name} 취소 에러: ${error.message}`);
            }
        }

        async function speedupBuilding(buildingIdx) {
            if (!userId) { showResult('플레이어 ID를 입력하세요'); return; }
            const building = allBuildingsList.find(b => b.idx === buildingIdx);
            const name = building ? (building.display_name || building.korean_name) : buildingIdx;
            const seconds = prompt('가속할 시간(초)을 입력하세요:', '60');
            if (!seconds) return;
            try {
                showResult(`${name} 가속 중...`);
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_no: parseInt(userId), api_code: 2007, data: { building_idx: buildingIdx, speedup_seconds: parseInt(seconds) } })
                });
                const result = await response.json();
                if (result.success) {
                    if (result.data) userBuildingData[buildingIdx] = result.data;
                    await loadBuildings();
                    showResult(`${name} ${seconds}초 가속 완료`);
                } else {
                    showResult(`${name} 가속 실패: ${result.message}`);
                }
            } catch (error) {
                showResult(`${name} 가속 에러: ${error.message}`);
            }
        }

        async function finishAllBuildings() {
            if (!userId) { showResult('플레이어 ID를 입력하세요'); return; }
            try {
                showResult('완료된 건물 일괄 처리 중...');
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_no: parseInt(userId), api_code: 2006, data: {} })
                });
                const result = await response.json();
                if (result.success) {
                    const count = result.data?.buildings?.length || 0;
                    await loadBuildings();
                    showResult(`${count}개 건물 일괄 완료 처리`);
                } else {
                    showResult(`일괄 완료 실패: ${result.message}`);
                }
            } catch (error) {
                showResult(`일괄 완료 에러: ${error.message}`);
            }
        }

        function showResult(message) {
            const resultBox = document.getElementById('result');
            resultBox.style.display = 'block';
            resultBox.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            console.log(`📢 ${message}`);
        }
        
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                console.log('👀 페이지 활성화 - 화면 업데이트 재시작');
                startDisplayTimer();
            } else {
                console.log('😴 페이지 비활성화');
            }
        });
        
        window.onbeforeunload = function() {
            if (displayTimer) {
                clearInterval(displayTimer);
                displayTimer = null;
            }
            console.log('🔄 페이지 종료 - 타이머 정리');
        };
    </script>
</body>
</html>
