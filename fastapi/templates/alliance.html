<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연맹</title>
    <style>
        body { font-family: Arial, sans-serif; font-size: 12px; padding: 8px; background: white; margin: 0; }

        /* ===== 격자 레이아웃 ===== */
        .panel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        /* ===== 섹션 패널 (고정 크기) ===== */
        .game-section {
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 8px;
            background: #fff;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .game-section h3 {
            margin: 0 0 6px 0;
            padding-bottom: 4px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
            flex-shrink: 0;
        }

        /* 카드 높이 고정 */
        .card-h1 { height: 220px; }   /* 연맹 정보, 공지사항 */
        .card-h2 { height: 275px; }   /* 연맹 연구, 멤버목록 */
        .card-h3 { height: 220px; }   /* 연맹 검색, 연맹관리 */

        /* ===== 스크롤 영역 (flex 자식으로 남은 공간 차지) ===== */
        .scrollable { flex: 1; overflow-y: auto; min-height: 0; }

        /* ===== 버튼 ===== */
        .btn { padding: 3px 8px; background: #fff; color: #333; border: 1px solid #ddd; cursor: pointer; font-size: 11px; border-radius: 2px; }
        .btn:hover { background: #eee; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-primary { background: #333; color: #fff; border-color: #333; }
        .btn-primary:hover { background: #555; }
        .btn-danger  { color: #d33; border-color: #d33; }
        .btn-danger:hover  { background: #fdd; }
        .btn-sm { padding: 2px 6px; font-size: 10px; }

        /* ===== 결과 박스 ===== */
        .result-box { margin-top: 8px; padding: 7px; border-radius: 4px; display: none; font-size: 11px; }
        .result-box.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .result-box.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .empty-msg { text-align: center; padding: 10px; color: #999; font-size: 11px; }

        /* ===== 테이블 ===== */
        .ally-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .ally-table th, .ally-table td { padding: 3px 5px; text-align: center; border: 1px solid #ddd; }
        .ally-table th { background: #f5f5f5; font-weight: bold; }

        /* ===== 정보 카드 ===== */
        .info-row   { display: flex; justify-content: space-between; margin-bottom: 3px; font-size: 11px; flex-shrink: 0; }
        .info-label { color: #888; }
        .info-value { font-weight: bold; }
        .action-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; flex-shrink: 0; }

        /* ===== 공지 ===== */
        .notice-box   { background: #fffde7; border: 1px solid #ffe082; border-radius: 4px; padding: 8px; font-size: 11px; flex-shrink: 0; }
        .notice-date  { color: #999; font-size: 10px; margin-top: 3px; }
        .notice-input { width: 100%; padding: 5px; border: 1px solid #ddd; border-radius: 3px; font-size: 11px; resize: none; box-sizing: border-box; }

        /* ===== 연구 카드 ===== */
        .research-card { border: 1px solid #ddd; border-radius: 4px; padding: 7px; margin-bottom: 6px; background: #fff; flex-shrink: 0; }
        .research-card.recommended-research { border-color: #ff9800; background: #fff3e0; }
        .research-card.ready-research  { border-color: #2196f3; background: #e3f2fd; }
        .rc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .rc-name   { font-weight: bold; font-size: 11px; }
        .rc-level  { color: #666; font-size: 10px; }
        .progress-bar  { background: #eee; border-radius: 3px; height: 13px; overflow: hidden; position: relative; margin-bottom: 5px; }
        .progress-fill { background: #4caf50; height: 100%; }
        .progress-fill.progress-full { background: #2196f3; }
        .progress-text { position: absolute; top: 0; left: 0; right: 0; text-align: center; font-size: 9px; line-height: 13px; color: #333; }
        .recommend-badge { display: inline-block; background: #ff9800; color: #fff; font-size: 9px; padding: 1px 5px; border-radius: 8px; margin-left: 3px; }
        .ready-badge   { display: inline-block; background: #2196f3; color: #fff; font-size: 9px; padding: 1px 5px; border-radius: 8px; margin-left: 3px; }
        .app-badge     { display: inline-block; background: #ff5722; color: #fff; font-size: 9px; padding: 0 4px; border-radius: 8px; margin-left: 3px; }

        /* ===== 연구별 기부 인라인 ===== */
        .rc-donate { display: flex; gap: 3px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
        .rc-donate select { padding: 2px 4px; border: 1px solid #ddd; border-radius: 3px; font-size: 10px; flex: 1; min-width: 50px; }
        .rc-donate input[type=number] { padding: 2px 4px; border: 1px solid #ddd; border-radius: 3px; font-size: 10px; width: 58px; }
        .rc-actions { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; align-items: center; }

        /* ===== 검색 ===== */
        .search-row { display: flex; gap: 6px; margin-bottom: 6px; flex-shrink: 0; }
        .search-row input { flex: 1; padding: 5px; border: 1px solid #ddd; border-radius: 3px; font-size: 11px; }

        /* ===== 생성 폼 ===== */
        .form-group { margin-bottom: 6px; flex-shrink: 0; }
        .form-group label  { display: block; font-size: 11px; color: #666; margin-bottom: 2px; }
        .form-group input, .form-group select { width: 100%; padding: 5px; border: 1px solid #ddd; border-radius: 3px; font-size: 11px; box-sizing: border-box; }

        /* ===== 미가입 헤더 ===== */
        .no-ally-header { text-align: center; padding: 10px 8px 8px; margin-bottom: 8px; background: #f5f5f5; border-radius: 4px; }
        .no-ally-header p { margin: 0; color: #666; font-size: 12px; }

        /* ===== 권한 없음 ===== */
        .no-permission { display: flex; align-items: center; justify-content: center; flex: 1; color: #bbb; font-size: 12px; }

        /* ===== 연맹관리 ===== */
        .manage-inner { display: flex; flex-direction: column; flex: 1; min-height: 0; }
        .manage-actions { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; flex-shrink: 0; }
        .manage-label   { font-size: 11px; color: #666; margin-bottom: 4px; flex-shrink: 0; }
    </style>
</head>
<body>

    <!-- ====== 미가입 상태 ====== -->
    <div id="noAllianceView" style="display:none;">
        <div class="no-ally-header"><p>소속된 연맹이 없습니다</p></div>
        <div class="panel-grid">

            <!-- 연맹 생성 -->
            <div class="game-section card-h1">
                <h3>연맹 생성</h3>
                <div id="createFormFields" style="display:none;">
                    <div class="form-group">
                        <label>연맹 이름</label>
                        <input type="text" id="createName" maxlength="20" placeholder="2~20자">
                    </div>
                    <div class="form-group">
                        <label>가입 방식</label>
                        <select id="createJoinType">
                            <option value="free">자유가입</option>
                            <option value="approval">승인제</option>
                        </select>
                    </div>
                    <button class="btn btn-primary btn-sm" onclick="createAlliance()">생성</button>
                    <button class="btn btn-sm" onclick="toggleCreateForm()">취소</button>
                </div>
                <div id="createFormBtn">
                    <button class="btn btn-primary btn-sm" onclick="toggleCreateForm()">생성하기</button>
                </div>
            </div>

            <!-- 연맹 검색 (미가입) -->
            <div class="game-section card-h1">
                <h3>연맹 검색</h3>
                <div class="search-row">
                    <input type="text" id="searchKeywordNoAlliance" placeholder="이름 검색">
                    <button class="btn btn-sm" onclick="searchAlliance('noAlliance')">검색</button>
                </div>
                <div class="scrollable">
                    <table class="ally-table">
                        <thead><tr><th>이름</th><th>레벨</th><th>인원</th><th>가입</th></tr></thead>
                        <tbody id="searchTableBodyNoAlliance"><tr><td colspan="4" class="empty-msg">검색어 입력</td></tr></tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- ====== 가입 상태 ====== -->
    <div id="allianceView" style="display:none;">
        <div class="panel-grid">

            <!-- ① 연맹 정보 -->
            <div class="game-section card-h1">
                <h3>연맹 정보</h3>
                <div class="info-row"><span class="info-label">연맹명</span><span class="info-value" id="infoName">-</span></div>
                <div class="info-row"><span class="info-label">레벨</span><span class="info-value" id="infoLevel">-</span></div>
                <div class="info-row"><span class="info-label">경험치</span><span class="info-value" id="infoExp">-</span></div>
                <div class="info-row"><span class="info-label">인원</span><span class="info-value" id="infoMembers">-</span></div>
                <div class="info-row"><span class="info-label">가입방식</span><span class="info-value" id="infoJoinType">-</span></div>
                <div class="info-row"><span class="info-label">맹주</span><span class="info-value" id="infoLeader">-</span></div>
                <div class="info-row"><span class="info-label">내 직책</span><span class="info-value" id="infoMyPosition">-</span></div>
                <div class="action-row">
                    <button class="btn btn-sm btn-danger" id="btnLeave" onclick="leaveAlliance()">탈퇴</button>
                </div>
            </div>

            <!-- ② 공지사항 -->
            <div class="game-section card-h1">
                <h3>공지사항</h3>
                <div id="noticeDisplay" class="notice-box" style="display:none;">
                    <div id="noticeContent">-</div>
                    <div class="notice-date" id="noticeDate">-</div>
                </div>
                <div id="noticeEmpty" class="empty-msg" style="padding:4px; flex-shrink:0;">등록된 공지 없음</div>
                <div id="noticeWriteArea" style="display:none; margin-top:6px; flex-shrink:0;">
                    <textarea id="noticeInput" class="notice-input" rows="2" placeholder="공지 내용"></textarea>
                    <button class="btn btn-primary btn-sm" onclick="writeNotice()" style="margin-top:4px;">공지 등록</button>
                </div>
            </div>

            <!-- ③ 연맹 연구 -->
            <div class="game-section card-h2">
                <h3>연맹 연구</h3>
                <div id="researchList" class="scrollable"><div class="empty-msg">로딩 중...</div></div>
            </div>

            <!-- ④ 멤버목록 -->
            <div class="game-section card-h2">
                <h3>멤버목록</h3>
                <div class="scrollable">
                    <table class="ally-table">
                        <thead><tr><th>유저</th><th>직책</th><th>EXP기부</th><th>코인기부</th><th>관리</th></tr></thead>
                        <tbody id="memberTableBody"><tr><td colspan="5" class="empty-msg">로딩 중...</td></tr></tbody>
                    </table>
                </div>
            </div>

            <!-- ⑤ 연맹 검색 -->
            <div class="game-section card-h3">
                <h3>연맹 검색</h3>
                <div class="search-row">
                    <input type="text" id="searchKeyword" placeholder="이름 검색">
                    <button class="btn btn-sm" onclick="searchAlliance('main')">검색</button>
                </div>
                <div class="scrollable">
                    <table class="ally-table">
                        <thead><tr><th>이름</th><th>레벨</th><th>인원</th><th>가입</th></tr></thead>
                        <tbody id="searchTableBody"><tr><td colspan="4" class="empty-msg">검색어 입력</td></tr></tbody>
                    </table>
                </div>
            </div>

            <!-- ⑥ 연맹관리 -->
            <div class="game-section card-h3">
                <h3>연맹관리</h3>
                <!-- 권한 있음 (간부 이상) -->
                <div id="manageAllowed" class="manage-inner" style="display:none;">
                    <div class="manage-actions">
                        <button class="btn btn-sm" id="btnSetJoinType" onclick="toggleJoinType()" style="display:none;">가입방식 변경</button>
                        <button class="btn btn-sm btn-danger" id="btnDisband" onclick="disbandAlliance()" style="display:none;">해산</button>
                    </div>
                    <div class="manage-label">가입 신청 <span id="appBadge" class="app-badge" style="display:none;">0</span></div>
                    <div class="scrollable">
                        <table class="ally-table">
                            <thead><tr><th>유저</th><th>신청일</th><th>처리</th></tr></thead>
                            <tbody id="appTableBody"><tr><td colspan="3" class="empty-msg">로딩 중...</td></tr></tbody>
                        </table>
                    </div>
                </div>
                <!-- 권한 없음 -->
                <div id="manageNoPermission" class="no-permission">권한이 없습니다</div>
            </div>

        </div>
    </div>

    <div id="result" class="result-box"></div>

    <script>
        let currentUserId = null;
        let allianceData   = null;
        let myPosition     = null;
        let currentAllianceNo = null;

        // ==================== 메시지 수신 ====================

        window.addEventListener('message', async function(event) {
            if (event.data && event.data.type === 'set_player_id') {
                const newId = parseInt(event.data.userId);
                if (currentUserId !== newId) {
                    currentUserId = newId;
                    await loadAllianceInfo();
                }
            }
        });

        function getUserNo() {
            if (currentUserId) return currentUserId;
            if (window.parent && window.parent.currentUserId) {
                currentUserId = parseInt(window.parent.currentUserId);
                return currentUserId;
            }
            return null;
        }

        // ==================== API 공통 ====================

        async function apiCall(apiCode, data = {}) {
            const uid = getUserNo();
            if (!uid) return null;
            try {
                const res = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_no: uid, api_code: apiCode, data })
                });
                return await res.json();
            } catch (e) {
                return { success: false, message: e.message };
            }
        }

        // ==================== 연맹 정보 로드 ====================

        async function loadAllianceInfo() {
            const result = await apiCall(7001);
            if (!result || !result.success || !result.data.has_alliance) {
                showNoAlliance(); return;
            }
            const data = result.data;
            allianceData      = data.alliance;
            myPosition        = data.my_position;
            currentAllianceNo = allianceData.alliance_no;
            showAllianceView();
            renderAllianceInfo(data);
            loadMembers();
            loadResearch();
            if (myPosition <= 3) loadApplications();
        }

        function showNoAlliance() {
            document.getElementById('noAllianceView').style.display = 'block';
            document.getElementById('allianceView').style.display   = 'none';
            allianceData = null; myPosition = null; currentAllianceNo = null;
        }

        function showAllianceView() {
            document.getElementById('noAllianceView').style.display = 'none';
            document.getElementById('allianceView').style.display   = 'block';
        }

        function renderAllianceInfo(data) {
            const a = data.alliance;
            document.getElementById('infoName').textContent      = a.name;
            document.getElementById('infoLevel').textContent     = `Lv.${a.level}`;
            document.getElementById('infoExp').textContent       = (a.exp || 0).toLocaleString();
            document.getElementById('infoMembers').textContent   = `${a.member_count} / ${a.max_members}`;
            document.getElementById('infoJoinType').textContent  = a.join_type === 'free' ? '자유가입' : '승인제';
            document.getElementById('infoLeader').textContent    = `#${a.leader_no}`;
            document.getElementById('infoMyPosition').textContent = getPositionName(myPosition);

            if (data.notice && data.notice.content) {
                document.getElementById('noticeDisplay').style.display = 'block';
                document.getElementById('noticeEmpty').style.display   = 'none';
                document.getElementById('noticeContent').textContent   = data.notice.content;
                document.getElementById('noticeDate').textContent      = data.notice.updated_at || '';
            } else {
                document.getElementById('noticeDisplay').style.display = 'none';
                document.getElementById('noticeEmpty').style.display   = 'block';
            }
            renderPermissionUI();
        }

        function renderPermissionUI() {
            const isLeader  = myPosition === 1;
            const isOfficer = myPosition <= 3;

            // 탈퇴 (리더는 불가)
            document.getElementById('btnLeave').style.display = isLeader ? 'none' : 'inline-block';

            // 공지 작성 (리더만)
            document.getElementById('noticeWriteArea').style.display = isLeader ? 'block' : 'none';

            // 연맹관리 카드
            if (isOfficer) {
                document.getElementById('manageAllowed').style.display    = 'flex';
                document.getElementById('manageNoPermission').style.display = 'none';
                document.getElementById('btnSetJoinType').style.display   = isLeader ? 'inline-block' : 'none';
                document.getElementById('btnDisband').style.display       = isLeader ? 'inline-block' : 'none';
            } else {
                document.getElementById('manageAllowed').style.display    = 'none';
                document.getElementById('manageNoPermission').style.display = 'flex';
            }
        }

        function getPositionName(pos) {
            return { 1: '맹주', 2: '부맹주', 3: '간부', 4: '일반' }[pos] || '-';
        }

        // ==================== 연맹 생성 ====================

        function toggleCreateForm() {
            const fields = document.getElementById('createFormFields');
            const btn    = document.getElementById('createFormBtn');
            const show   = fields.style.display === 'none';
            fields.style.display = show ? 'block' : 'none';
            btn.style.display    = show ? 'none'  : 'block';
        }

        async function createAlliance() {
            const name     = document.getElementById('createName').value.trim();
            const joinType = document.getElementById('createJoinType').value;
            if (!name || name.length < 2 || name.length > 20) {
                showResult('연맹 이름은 2~20자여야 합니다', 'error'); return;
            }
            const result = await apiCall(7002, { name, join_type: joinType });
            if (result.success) { showResult('연맹이 생성되었습니다!', 'success'); await loadAllianceInfo(); }
            else showResult(result.message, 'error');
        }

        // ==================== 연맹 가입 ====================

        async function joinAlliance(allianceNo) {
            const result = await apiCall(7003, { alliance_no: allianceNo });
            if (result.success) {
                const s = result.data.status;
                showResult(s === 'joined' ? '연맹에 가입되었습니다!' : '가입 신청 완료!', 'success');
                if (s === 'joined') await loadAllianceInfo();
            } else showResult(result.message, 'error');
        }

        // ==================== 탈퇴 / 해산 ====================

        async function leaveAlliance() {
            if (!confirm('정말 연맹을 탈퇴하시겠습니까?')) return;
            const result = await apiCall(7004);
            if (result.success) { showResult('연맹을 탈퇴했습니다', 'success'); await loadAllianceInfo(); }
            else showResult(result.message, 'error');
        }

        async function disbandAlliance() {
            if (!confirm('정말 연맹을 해산하시겠습니까? 되돌릴 수 없습니다.')) return;
            const result = await apiCall(7013);
            if (result.success) { showResult('연맹이 해산되었습니다', 'success'); await loadAllianceInfo(); }
            else showResult(result.message, 'error');
        }

        // ==================== 가입방식 변경 ====================

        async function toggleJoinType() {
            const newType = allianceData.join_type === 'free' ? 'approval' : 'free';
            const result  = await apiCall(7012, { join_type: newType });
            if (result.success) {
                showResult(`가입 방식: ${newType === 'free' ? '자유가입' : '승인제'}으로 변경`, 'success');
                await loadAllianceInfo();
            } else showResult(result.message, 'error');
        }

        // ==================== 멤버 ====================

        async function loadMembers() {
            const result = await apiCall(7006);
            if (!result || !result.success) return;
            const members = result.data.members || [];
            const tbody   = document.getElementById('memberTableBody');
            if (!members.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">멤버 없음</td></tr>'; return;
            }
            tbody.innerHTML = members.map(m => {
                let actions = '';
                if (myPosition <= 3 && m.position > myPosition && m.user_no !== currentUserId)
                    actions += `<button class="btn btn-sm" onclick="kickMember(${m.user_no})">추방</button> `;
                if (myPosition <= 2 && m.user_no !== currentUserId)
                    actions += `<button class="btn btn-sm" onclick="promoteMember(${m.user_no})">직책변경</button>`;
                return `<tr>
                    <td>#${m.user_no}</td>
                    <td>${getPositionName(m.position)}</td>
                    <td>${(m.donated_exp  || 0).toLocaleString()}</td>
                    <td>${(m.donated_coin || 0).toLocaleString()}</td>
                    <td>${actions || '-'}</td>
                </tr>`;
            }).join('');
        }

        async function kickMember(targetNo) {
            if (!confirm(`유저 #${targetNo}을(를) 추방하시겠습니까?`)) return;
            const result = await apiCall(7007, { target_user_no: targetNo });
            if (result.success) { showResult('추방 완료', 'success'); await loadMembers(); }
            else showResult(result.message, 'error');
        }

        async function promoteMember(targetNo) {
            const newPos = prompt('새 직책 번호 (2:부맹주, 3:간부, 4:일반)');
            if (!newPos) return;
            const result = await apiCall(7008, { target_user_no: targetNo, new_position: parseInt(newPos) });
            if (result.success) { showResult('직책 변경 완료', 'success'); await loadMembers(); }
            else showResult(result.message, 'error');
        }

        // ==================== 공지사항 ====================

        async function writeNotice() {
            const content = document.getElementById('noticeInput').value.trim();
            if (!content) { showResult('공지 내용을 입력해주세요', 'error'); return; }
            const result = await apiCall(7015, { notice: content });
            if (result.success) {
                showResult('공지가 등록되었습니다', 'success');
                document.getElementById('noticeInput').value = '';
                await loadAllianceInfo();
            } else showResult(result.message, 'error');
        }

        // ==================== 연맹 연구 (연구별 기부 포함) ====================

        async function loadResearch() {
            const result = await apiCall(7016);
            if (!result || !result.success) return;
            const list      = result.data.research_list || [];
            const container = document.getElementById('researchList');
            if (!list.length) {
                container.innerHTML = '<div class="empty-msg">연구 항목 없음</div>'; return;
            }
            container.innerHTML = list.map(r => {
                const pct = r.required_exp > 0
                    ? Math.min(100, r.current_exp / r.required_exp * 100).toFixed(1) : 100;
                const isReady      = !r.is_max && r.current_exp >= r.required_exp;
                const canDonate    = !r.is_max;
                const canRecommend = myPosition <= 3 && !r.is_max && !r.is_active && !isReady;
                const canStart     = myPosition <= 3 && isReady;
                const cardClass    = r.is_active ? ' recommended-research' : (isReady ? ' ready-research' : '');
                return `<div class="research-card${cardClass}" data-research-idx="${r.research_idx}">
                    <div class="rc-header">
                        <span class="rc-name">연구 #${r.research_idx}
                            ${r.is_active ? '<span class="recommend-badge">추천</span>' : ''}
                            ${isReady    ? '<span class="ready-badge">시작 가능</span>' : ''}
                        </span>
                        <span class="rc-level">${r.is_max ? 'MAX' : `Lv.${r.level}/${r.max_level}`}</span>
                    </div>
                    ${!r.is_max ? `<div class="progress-bar">
                        <div class="progress-fill${isReady ? ' progress-full' : ''}" style="width:${pct}%"></div>
                        <div class="progress-text">${r.current_exp.toLocaleString()} / ${r.required_exp.toLocaleString()}</div>
                    </div>` : ''}
                    <div class="rc-actions">
                        ${canDonate ? `<div class="rc-donate">
                            <select class="donate-res">
                                <option value="food">식량</option>
                                <option value="wood">목재</option>
                                <option value="stone">석재</option>
                                <option value="gold">골드</option>
                            </select>
                            <input type="number" class="donate-amt" value="1000" min="1">
                            <button class="btn btn-primary btn-sm" onclick="donateToResearch(this)">기부</button>
                        </div>` : ''}
                        ${canRecommend ? `<button class="btn btn-sm" onclick="selectResearch(${r.research_idx})">추천</button>` : ''}
                        ${canStart     ? `<button class="btn btn-primary btn-sm" onclick="selectResearch(${r.research_idx})">연구 시작</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        async function donateToResearch(btn) {
            const card         = btn.closest('.research-card');
            const researchIdx  = parseInt(card.dataset.researchIdx);
            const resourceType = card.querySelector('.donate-res').value;
            const amount       = parseInt(card.querySelector('.donate-amt').value);
            if (!amount || amount <= 0) { showResult('기부 수량을 확인해주세요', 'error'); return; }
            const result = await apiCall(7011, { research_idx: researchIdx, resource_type: resourceType, amount });
            if (result.success) {
                const d = result.data;
                showResult(
                    `기부 완료! EXP +${d.exp_gained} / 코인 +${d.coin_gained}` +
                    (d.leveled_up ? ' [연맹 레벨업!]' : ''),
                    'success'
                );
                await loadResearch();
                await loadAllianceInfo();
                window.parent.postMessage({ type: 'refresh_resource' }, '*');
            } else showResult(result.message, 'error');
        }

        async function selectResearch(researchIdx) {
            const result = await apiCall(7017, { research_idx: researchIdx });
            if (result.success) {
                const msg = result.data.leveled_up
                    ? `연구 시작! Lv.${result.data.level} 달성`
                    : '추천 연구로 설정되었습니다';
                showResult(msg, 'success');
                await loadResearch();
                await loadAllianceInfo();
            } else showResult(result.message, 'error');
        }

        // ==================== 가입 신청 ====================

        async function loadApplications() {
            const result = await apiCall(7009);
            if (!result || !result.success) return;
            const apps  = result.data.applications || [];
            const tbody = document.getElementById('appTableBody');
            const badge = document.getElementById('appBadge');
            badge.style.display = apps.length > 0 ? 'inline' : 'none';
            badge.textContent   = apps.length;
            if (!apps.length) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty-msg">신청 없음</td></tr>'; return;
            }
            tbody.innerHTML = apps.map(a => `<tr>
                <td>#${a.user_no}</td>
                <td>${(a.applied_at || '').slice(0, 10)}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="approveApp(${a.user_no},true)">승인</button>
                    <button class="btn btn-sm btn-danger"  onclick="approveApp(${a.user_no},false)">거절</button>
                </td>
            </tr>`).join('');
        }

        async function approveApp(targetNo, approve) {
            const result = await apiCall(7010, { target_user_no: targetNo, approve });
            if (result.success) { showResult(approve ? '승인 완료' : '거절 완료', 'success'); await loadApplications(); }
            else showResult(result.message, 'error');
        }

        // ==================== 연맹 검색 ====================

        async function searchAlliance(context) {
            const keyId   = context === 'noAlliance' ? 'searchKeywordNoAlliance' : 'searchKeyword';
            const tableId = context === 'noAlliance' ? 'searchTableBodyNoAlliance' : 'searchTableBody';
            const keyword = document.getElementById(keyId).value.trim();
            const result  = await apiCall(7005, { keyword });
            if (!result || !result.success) return;
            const alliances = result.data.alliances || [];
            const tbody     = document.getElementById(tableId);
            if (!alliances.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-msg">검색 결과 없음</td></tr>'; return;
            }
            tbody.innerHTML = alliances.map(a => `<tr>
                <td>${a.name}</td>
                <td>Lv.${a.level}</td>
                <td>${a.member_count} / ${a.max_members || '?'}</td>
                <td><button class="btn btn-sm" onclick="joinAlliance(${a.alliance_no})">가입</button></td>
            </tr>`).join('');
        }

        // ==================== 결과 표시 ====================

        function showResult(message, type) {
            const el = document.getElementById('result');
            el.textContent = message;
            el.className   = `result-box ${type}`;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 4000);
        }

        // ==================== 초기화 ====================

        window.onload = function() {
            const uid = getUserNo();
            if (uid) loadAllianceInfo();
        };
    </script>
</body>
</html>
